services:
  backend:
    build: ./backend
    container_name: kernvox-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://kernvox:${POSTGRES_PASSWORD}@postgres:5432/kernvox
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/0
      - API_SECRET=${API_SECRET}
      - API_TOKEN=${API_TOKEN:-}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_dev_password}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:3000,http://127.0.0.1:3000}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-}
      - COLLECTOR_INTERVAL=${COLLECTOR_INTERVAL:-60}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - kernvox-network

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: kernvox-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=kernvox
      - POSTGRES_USER=kernvox
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kernvox -d kernvox"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kernvox-network

  redis:
    image: redis:7-alpine
    container_name: kernvox-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_password}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:-redis_dev_password}\" PING | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - kernvox-network

  nginx:
    image: nginx:alpine
    container_name: kernvox-nginx
    restart: unless-stopped
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    command: ["/bin/sh", "/etc/kernvox-nginx/entrypoint.sh"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx:/etc/kernvox-nginx:ro
      - certbot_data:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - kernvox-network

  certbot:
    image: certbot/certbot
    container_name: kernvox-certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - kernvox-network

  collector:
    build: ./backend
    container_name: kernvox-collector
    restart: unless-stopped
    command: python -m collector.scheduler
    environment:
      - DATABASE_URL=postgresql://kernvox:${POSTGRES_PASSWORD}@postgres:5432/kernvox
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/0
      - API_SECRET=${API_SECRET}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_dev_password}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - COLLECTOR_INTERVAL=${COLLECTOR_INTERVAL:-60}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kernvox-network

networks:
  kernvox-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  certbot_data:
